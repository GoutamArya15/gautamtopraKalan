<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Education Section - Portfolio</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Custom CSS -->
  <style>
    /* ===== Education Section Style ===== */
    #education {
      background-color: #f8f9fa;
      padding: 80px 0;
    }

    #education h2 {
      color: #0d6efd;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 40px;
    }

    .edu-card {
      transition: all 0.3s ease;
      border: none;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      background-color: #fff;
    }

    .edu-card:hover {
      transform: translateY(-7px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
    }

    .edu-card h5 {
      font-weight: 600;
      color: #212529;
    }

    .edu-card p {
      color: #6c757d;
      margin-bottom: 5px;
    }

    .edu-icon {
      font-size: 40px;
      color: #0d6efd;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>

  <!-- ===== Education Section Start ===== -->
  <section id="education">
    <div class="container text-center">
      <h2>Education</h2>
      <div class="row justify-content-center">

        <!-- Card 1 -->
        <div class="col-md-4 mb-4">
          <div class="edu-card p-4 h-100">
            <div class="edu-icon">
              🎓
            </div>
            <h5>Bachelor of Computer Applications (BCA)</h5>
            <p>Indira Gandhi National Open University (IGNOU)</p>
            <p>2022 – Present</p>
          </div>
        </div>

        <!-- Card 2 -->
        <div class="col-md-4 mb-4">
          <div class="edu-card p-4 h-100">
            <div class="edu-icon">
              🏫
            </div>
            <h5>Higher Secondary (12th)</h5>
            <p>State Board of Haryana</p>
            <p>2020 – 2021</p>
          </div>
        </div>

        <!-- Card 3 -->
        <div class="col-md-4 mb-4">
          <div class="edu-card p-4 h-100">
            <div class="edu-icon">
              📘
            </div>
            <h5>Matriculation (10th)</h5>
            <p>State Board of Haryana</p>
            <p>2018 – 2019</p>
          </div>
        </div>

      </div>
    </div>
  </section>
  <!-- ===== Education Section End ===== -->

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
